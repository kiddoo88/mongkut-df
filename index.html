function expandQuery(q) {
  const lower = q.toLowerCase();
  let terms = [lower];
  for (const [key, vals] of Object.entries(aliases)) {
    if (lower.includes(key)) {
      terms = [...terms, ...vals.map(v => v.toLowerCase())];
    }
  }
  return [...new Set(terms)];
}

function scoreMatch(proc, terms) {
  const nameL = proc.name.toLowerCase();
  const codeL = proc.code.toLowerCase();
  const catL = proc.cat.toLowerCase();
  let score = 0;
  for (const t of terms) {
    if (codeL === t) score += 100;
    if (nameL.includes(t)) score += nameL.startsWith(t) ? 30 : 15;
    if (codeL.includes(t)) score += 20;
    if (catL.includes(t)) score += 5;
  }
  return score;
}

function highlight(text, terms) {
  let out = text;
  for (const t of terms) {
    if (!t || t.length < 2) continue;
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    out = out.replace(re, '<mark>$1</mark>');
  }
  return out;
}

// Favourites (stored in localStorage)
let favs = new Set();
try { favs = new Set(JSON.parse(localStorage.getItem('mrh_favs') || '[]')); } catch(e){}
function saveFavs() {
  try { localStorage.setItem('mrh_favs', JSON.stringify([...favs])); } catch(e){}
}
function favKey(proc) { return proc.code + '||' + proc.name; }

// Filter state
let activeCat = '';
let showFavsOnly = false;

catSelect.addEventListener('change', () => {
  activeCat = catSelect.value;
  render();
});

const favFilterBtn = document.getElementById('favFilterBtn');
favFilterBtn.addEventListener('click', () => {
  showFavsOnly = !showFavsOnly;
  favFilterBtn.classList.toggle('active', showFavsOnly);
  render();
});

// Delegate fav star clicks
document.getElementById('results').addEventListener('click', e => {
  const btn = e.target.closest('.fav-btn');
  if (!btn) return;
  const key = btn.dataset.key;
  if (favs.has(key)) favs.delete(key);
  else favs.add(key);
  saveFavs();
  btn.classList.toggle('active', favs.has(key));
  btn.textContent = favs.has(key) ? '⭐' : '☆';
  btn.closest('.result-card').classList.toggle('favourited', favs.has(key));
  if (showFavsOnly) render();
});

document.getElementById('totalCount').textContent = DB.length;

function render() {
  const raw = document.getElementById('searchInput').value.trim();
  const results = document.getElementById('results');
  const countEl = document.getElementById('resultCount');

  let filtered = DB;
  if (activeCat) filtered = filtered.filter(d => d.cat === activeCat);
  if (showFavsOnly) filtered = filtered.filter(d => favs.has(favKey(d)));

  if (!raw) {
    countEl.textContent = filtered.length;
    results.innerHTML = filtered.map(proc => renderCard(proc, [])).join('');
    return;
  }

  const terms = expandQuery(raw);
  let scored = filtered
    .map(proc => ({ proc, score: scoreMatch(proc, terms) }))
    .filter(({score}) => score > 0)
    .sort((a, b) => b.score - a.score);

  countEl.textContent = scored.length;

  if (!scored.length) {
    results.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3>No procedures found</h3>
      <p>Try <span class="kbd-hint">EGD</span>, <span class="kbd-hint">colono</span>, <span class="kbd-hint">appendectomy</span>, or a code like <span class="kbd-hint">452-19-03</span></p>
    </div>`;
    return;
  }

  results.innerHTML = scored.map(({proc}) => renderCard(proc, terms)).join('');
}

function renderCard(proc, terms) {
  const nameHL = terms.length ? highlight(proc.name, terms) : proc.name;
  const codeHL = terms.length ? highlight(proc.code, terms) : proc.code;
  const color = catColors[proc.cat] || '#888';
  const key = favKey(proc);
  const isFav = favs.has(key);
  return `<div class="result-card${isFav ? ' favourited' : ''}">
    <button class="fav-btn${isFav ? ' active' : ''}" data-key="${key.replace(/"/g,'&quot;')}" title="Favourite">${isFav ? '⭐' : '☆'}</button>
    <div>
      <div class="proc-name">${nameHL}</div>
      <div class="proc-meta">
        <span class="code-tag">${codeHL}</span>
        <span class="cat-tag" style="background:${color}22;color:${color}">${proc.cat}</span>
      </div>
    </div>
    <div class="fee-col">
      <div class="fee-amount">${proc.fee.toLocaleString()}</div>
      <div class="fee-label">THB (DF)</div>
    </div>
  </div>`;
}

document.getElementById('searchInput').addEventListener('input', render);
render();
</script>
</body>
</html>
